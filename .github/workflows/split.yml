name: Split by Region

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write        # ← 加這個

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all.txt
        run: |
          curl -A "Mozilla/5.0" -o all.txt "https://zip.cm.edu.kg/all.txt"
          echo "Downloaded $(wc -l < all.txt) lines"

      - name: Split by region
        run: python3 split.py

      - name: Update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 update_readme.py

- name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add regions/ regions_443/ README.md
          git diff --staged --quiet || git commit -m "Auto update $(date +%F)"
          git push
